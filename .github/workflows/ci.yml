name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (single-file)
        run: npm run build

      - name: Size budget
        run: npm run check:size

      - name: Accessibility gate (WCAG AA contrast)
        run: npm run check:a11y

      - name: Layout overflow guard
        run: npm run check:overflow

      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx > sbom.cyclonedx.json

      - name: Upload build + SBOM
        uses: actions/upload-artifact@v4
        with:
          name: hr-analytics-dist
          path: |
            dist/index.html
            sbom.cyclonedx.json
          if-no-files-found: error
